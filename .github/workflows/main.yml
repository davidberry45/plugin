name: Build PoclusSurvival Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn package -B --no-transfer-progress

      - name: Upload .jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: PoclusSurvival-${{ github.sha }}
          path: target/PoclusSurvival-*.jar
          retention-days: 30
